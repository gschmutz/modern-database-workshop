# =======================================================================
# Platform Name            nosql-platform-2
# Platform Stack:          trivadis/platys-modern-data-platform
# Platform Stack Version:  develop
# =======================================================================
networks:
  default:
    name: nosql-platform-2
services:
  #  ================================== MCP Inspector ========================================== #
  mcp-inspector:
    image: ghcr.io/modelcontextprotocol/inspector:latest
    container_name: mcp-inspector
    hostname: mcp-inspector
    labels:
      com.platys.name: mcp-inspector
      com.platys.description: MCP Inspector
      com.platys.webui.title: MCP Inspector UI
      com.platys.webui.url: http://dataplatform:6274
    ports:
      - 6274:6274
      - 6277:6277
    environment:
      DANGEROUSLY_OMIT_AUTH: true
      CLIENT_PORT: 6274
      SERVER_PORT: 6277
      HOST: 0.0.0.0
      MCP_SERVER_REQUEST_TIMEOUT: 10000
      MCP_REQUEST_TIMEOUT_RESET_ON_PROGRESS: true
      MCP_REQUEST_MAX_TOTAL_TIMEOUT: 60000
    volumes:
      - ./data-transfer:/data-transfer
    restart: unless-stopped
  #  ================================== Jupyter ========================================== #
  jupyter:
    image: jupyter/minimal-notebook:latest
    container_name: jupyter
    hostname: jupyter
    labels:
      com.platys.name: jupyter
      com.platys.description: Web-based interactive development environment for notebooks, code, and data
      com.platys.webui.title: Jupyter UI
      com.platys.webui.url: http://dataplatform:28888
      com.platys.password.envvars: PLATYS_JUPYTER_TOKEN,PLATYS_AWS_SECRET_ACCESS_KEY
    ports:
      - 28888:8888
    user: root
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      JUPYTER_ENABLE_LAB: "'yes'"
      GRANT_SUDO: "'yes'"
      JUPYTER_TOKEN: ${PLATYS_JUPYTER_TOKEN:-abc123!}
      DOCKER_STACKS_JUPYTER_CMD: lab
      MAVEN_DOWNLOAD_JARS: com.amazonaws:aws-java-sdk-bundle:1.12.262,org.apache.hadoop:hadoop-aws:3.3.4,com.google.guava:guava:27.1-jre,software.amazon.awssdk:bundle:2.27.1
      # remove some JARS if they are conflicting with the ones installed above
      REMOVE_JARS: guava-14.0.1.jar
    volumes:
      - ./data-transfer:/data-transfer
      - ./init/jupyter/on-startup-jupyter/:/usr/local/bin/start-notebook.d/
      - ./init/jupyter/on-startup-jupyter-finished/:/usr/local/bin/before-notebook.d/
      - ./init/jupyter/on-startup-notebook-kernel:/home/jovyan/.ipython/profile_default/startup/
      - ./scripts/docker/maven-download.sh:/maven-download.sh
    command:
      # In the command section, $ are replaced with $$ to avoid the error 'Invalid interpolation format for "command" option'
      - bash
      - -c
      - |
        start-notebook.sh
    restart: unless-stopped
  #  ================================== Neo4J ========================================== #
  neo4j-1:
    image: neo4j:2026
    hostname: neo4j-1
    container_name: neo4j-1
    labels:
      com.platys.name: neo4j
      com.platys.description: Native graph database management system
      com.platys.webui.title: Neo4J UI
      com.platys.webui.url: http://dataplatform:7474
      com.platys.password.envvars: PLATYS_NEO4J_PASSWORD
    ports:
      - 7474:7474      #  HTTP port #
      - 7687:7687       #  Bolt port #
    environment:
      - NEO4J_server_bolt_listen__address=0.0.0.0:7687
      - NEO4J_AUTH=neo4j/${PLATYS_NEO4J_PASSWORD:-abc123abc123}
      - NEO4J_dbms_security_allow__csv__import__from__file__urls=False
      - NEO4J_server_directories_import=
      - NEO4J_server_logs_debug_enabled=False
      - EXTENSION_SCRIPT=
      - NEO4J_apoc_export_file_enabled=False
      - NEO4J_apoc_import_file_enabled=False
      - NEO4J_apoc_import_file_use__neo4j__config=True
      - NEO4J_apoc_import_file_allow__read__from__filesystem=False
      - NEO4J_apoc_trigger_enabled=False
      - NEO4J_apoc_trigger_refresh=60000
    volumes:
      - ./data-transfer:/data-transfer
      - ./init/neo4j:/init
    restart: unless-stopped
    healthcheck:
      test: [CMD-SHELL, wget --no-verbose --tries=1 --spider localhost:7474 || exit 1]
      interval: 15s
      timeout: 30s
      retries: 10
  #  ================================== Neo4J MCP ========================================== #
  neo4j-mcp:
    image: mcp/neo4j:latest
    container_name: neo4j-mcp
    hostname: neo4j-mcp
    labels:
      com.platys.name: neo4j-mcp
      com.platys.description: MCP Server for Neo4J
      com.platys.restapi.title: MCP Server for Neo4J
      com.platys.restapi.url: http://dataplatform:28271
    ports:
      - 28271:8000
    environment:
      NEO4J_URI: bolt://neo4j-1:7687
      NEO4J_DATABASE: neo4j
      NEO4J_READ_ONLY: false
      NEO4J_TELEMETRY: false
      NEO4J_SCHEMA_SAMPLE_SIZE: 100
      NEO4J_TRANSPORT_MODE: http
      NEO4J_MCP_HTTP_HOST: 0.0.0.0
      NEO4J_MCP_HTTP_PORT: 8000
      NEO4J_MCP_HTTP_ALLOWED_ORIGINS: '*'
      NEO4J_MCP_HTTP_TLS_ENABLED: false
    volumes:
      - ./data-transfer:/data-transfer
    restart: unless-stopped
  #  ================================== NeoDash ========================================== #
  neodash:
    image: neo4jlabs/neodash:latest
    platform: linux/amd64
    hostname: neodash
    container_name: neodash
    labels:
      com.platys.name: neodash
      com.platys.description: Visualize you Neo4J data
      com.platys.webui.title: NeoDash UI
      com.platys.webui.url: http://dataplatform:5005
    ports:
      - 5005:5005
    volumes:
      - ./data-transfer:/data-transfer
    restart: unless-stopped
  #  ================================== GraphDB ========================================== #
  graphdb-1:
    image: ontotext/graphdb:11.3.2
    hostname: graphdb-1
    container_name: graphdb-1
    labels:
      com.platys.name: graphdb
      com.platys.description: Triple/RDF Store
      com.platys.webui.title: GraphDBs UI
      com.platys.webui.url: http://dataplatform:17200
    ports:
      - 17200:7200
    environment:
      GDB_HEAP_SIZE: 2G
      GDB_JAVA_OPTS: >-
        -Xmx2g -Xms2g
        -Dgraphdb.home=/opt/graphdb
        -Dgraphdb.license.file=/opt/graphdb/home/conf/graphdb.license
        -Dgraphdb.workbench.importDirectory=/opt/graphdb/examples
        -Dgraphdb.jsonld.whitelist=https://w3c.github.io/json-ld-api/tests/*
        -Dgraphdb.stats.default=disabled     -Dgraphdb.workbench.cors.enable=true
        -Denable-context-index=true
        -Dentity-pool-implementation=transactional
        -Dhealth.max.query.time.seconds=60
        -Dgraphdb.append.request.id.headers=true
        -Dreuse.vars.in.subselects=true
    volumes:
      - ./data-transfer:/data-transfer
      - ./licenses/graphdb:/opt/graphdb/home/conf/
    restart: unless-stopped
    healthcheck:
      test: [CMD-SHELL, "curl -f -H 'Accept: text/html' http://localhost:17200/index.html"]
      interval: 10s
      timeout: 5s
      retries: 5
  #  ================================== InfluxData Telegraf ========================================== #
  telegraf:
    image: telegraf:1.38
    container_name: telegraf
    hostname: telegraf
    labels:
      com.platys.name: telegraf
      com.platys.description: Agent for collecting, processing, aggregating, and writing metrics
    environment:
      HOSTNAME: telegraf
      INFLUXDB_TOKEN: ${PLATYS_INFLUXDB_TOKEN:-}
      INFLUXDB_DATABASE: demo-db
    volumes:
      - ./data-transfer:/data-transfer
      - ./conf/telegraf/telegraf-influxdb3.conf:/etc/telegraf/telegraf.conf
      # Mount for Docker API access
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
  #  ================================== InfluxDB 3 ========================================== #
  influxdb3:
    image: influxdb:3-core
    hostname: influxdb3
    container_name: influxdb3
    labels:
      com.platys.name: influxdb3
      com.platys.description: Timeseries Database
      com.platys.restapi.title: InfluxDB 3.0 Rest API
      com.platys.restapi.url: http://dataplatform:28263/api/v3
    ports:
      - 28263:8181
    volumes:
      - ./data-transfer:/data-transfer
    restart: unless-stopped
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
      - --plugin-dir=/var/lib/influxdb3/plugins   # Optional: only needed for processing engine plugins      
    healthcheck:
      test: [CMD, curl, -f, -H, 'Authorization: Bearer apiv3_test', http://localhost:8181/ping]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
  #  ================================== InfluxDB 3 Explorer ========================================== #
  influxdb3-explorer:
    image: influxdata/influxdb3-ui:latest
    hostname: influxdb3-explorer
    container_name: influxdb3-explorer
    labels:
      com.platys.name: influxdb3-explorer
      com.platys.description: Timeseries Database UI
      com.platys.webui.title: InfluxDB 3.0 Explorer
      com.platys.webui.url: http://dataplatform:28264
      com.platys.password.envvars: PLATYS_INFLUXDB3_EXPLORER_SECRET_KEY
    ports:
      - 28264:80
    environment:
      SESSION_SECRET_KEY: ${PLATYS_INFLUXDB3_EXPLORER_SECRET_KEY:-3fd4e9d0a3f7307fb5e3285414781fc2cfff1486d9306d0ea10dd5f39d6b0ea5}
      DATABASE_URL: /db/sqlite.db
    volumes:
      - ./data-transfer:/data-transfer
      - ./conf/influxdb3-explorer:/app-root/config:ro
    restart: unless-stopped
  #  ================================== Qdrant VectorDB ========================================== #
  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: qdrant
    hostname: qdrant
    labels:
      com.platys.name: qdrant
      com.platys.description: AI-native vector database
      com.platys.webui.title: Qdrant UI
      com.platys.webui.url: http://dataplatform:6333/dashboard
      com.platys.restapi.title: Qdrant API
      com.platys.restapi.url: http://dataplatform:6333
    ports:
      - 6333:6333
      - 6334:6334
    environment:
      IS_PERSISTENT: true
    volumes:
      - ./data-transfer:/data-transfer
    restart: unless-stopped
  #  ================================== CockroachDB ========================================== #  
  cockroachdb-1:
    image: cockroachdb/cockroach:v26.1.3
    container_name: cockroachdb-1
    hostname: cockroachdb-1
    labels:
      com.platys.name: cockroachdb
      com.platys.description: Cloud-native distributed SQL database
      com.platys.webui.title: CockroachDB Admin UI
      com.platys.webui.url: http://${PUBLIC_IP}:28406
    ports:
      - 26257:26257
      - 28406:8080
    environment:
      COCKROACH_DATABASE: defaultdb
    volumes:
      - ./data-transfer:/data-transfer
      - ./init/cockroachdb-1:/docker-entrypoint-initdb.d/
    command: >
      start-single-node
      --insecure   --advertise-addr=cockroachdb-1:26357
      --http-addr=cockroachdb-1:8080
      --listen-addr=cockroachdb-1:26357
      --sql-addr=cockroachdb-1:26257
      --join=cockroachdb-1:26357
      --store=/cockroach/cockroach-data
    restart: unless-stopped
    healthcheck:
      test: [CMD, cockroach, node, status, --insecure, --host=cockroachdb-1:26257]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  #  ================================== DbGate ========================================== #
  dbgate:
    image: dbgate/dbgate:latest
    container_name: dbgate
    hostname: dbgate
    labels:
      com.platys.name: dbgate
      com.platys.description: Open Source DB Management Tool
      com.platys.webui.title: DbGate UI
      com.platys.webui.url: http://dataplatform:28120
      com.platys.password.envvars: PLATYS_DBGATE_PASSWORD
    ports:
      - 28120:3000
    environment:
      LOG_LEVEL: info
      LOGIN: dbgate
      PASSWORD: ${PLATYS_DBGATE_PASSWORD:-abc123!}
    volumes:
      - ./data-transfer:/data-transfer
    restart: unless-stopped
  #  ================================== Mosquitto ========================================== #
  mosquitto-1:
    image: eclipse-mosquitto:2.0
    hostname: mosquitto-1
    container_name: mosquitto-1
    labels:
      com.platys.name: mosquitto
      com.platys.description: MQTT Broker
    ports:
      - 1883:1883
      - 9101:9001
    volumes:
      - ./data-transfer:/data-transfer
      - ./conf/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped
  #  ================================== MQTTX Web ========================================== #
  mqttx-cli:
    image: emqx/mqttx-cli:latest
    container_name: mqttx-cli
    hostname: mqttx-cli
    labels:
      com.platys.name: mqttx
      com.platys.description: a CLI for MQTT
    volumes:
      - ./data-transfer:/data-transfer
    entrypoint:
      - /bin/sh
      - -c
      - |
        while [ 1 -eq 1 ];do sleep 60;done
    restart: unless-stopped
  #  ================================== MQTT UI ========================================== #
  mqtt-ui:
    image: vergissberlin/hivemq-mqtt-web-client:latest
    container_name: mqtt-ui
    hostname: mqtt-ui
    labels:
      com.platys.name: hivemq-ui
      com.platys.description: MQTT UI
      com.platys.webui.title: HiveMQ UI
      com.platys.webui.url: http://dataplatform:28136
    ports:
      - 28136:80
    volumes:
      - ./data-transfer:/data-transfer
    restart: unless-stopped
  #  ================================== Grafana ========================================== #
  grafana:
    image: grafana/grafana:12.4.0-20977568970-ubuntu
    hostname: grafana
    container_name: grafana
    labels:
      com.platys.name: grafana
      com.platys.description: Data visualization and dashboarding
      com.platys.webui.title: Grafana UI
      com.platys.webui.url: http://dataplatform:3000
      com.platys.restapi.title: Grafana API
      com.platys.restapi.url: http://dataplatform:3000/api/org
    expose:
      - 3000
    ports:
      - 3000:3000
    environment:
      - GF_SERVER_HTTP_ADDR=0.0.0.0
      - GF_SERVER_HTTP_PORT=3000
      - GF_AUTH_ANONYMOUS_ENABLED=False
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=abc123!
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./data-transfer:/data-transfer
      - ./scripts/grafana/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml
      - ./scripts/grafana/dashboards/docker/monitor_services.json:/etc/grafana/provisioning/dashboards/docker/monitor_services.json
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c 'printf \"GET / HTTP/1.1\n\n\" > /dev/tcp/127.0.0.1/3000; exit $$?;'
      interval: 1s
      timeout: 5s
      retries: 5
  #  ================================== Wetty ========================================== #
  wetty:
    image: wettyoss/wetty:latest
    container_name: wetty
    hostname: wetty
    labels:
      com.platys.name: wetty
      com.platys.description: A terminal window in Web-Browser
      com.platys.webui.title: WeTTY UI
      com.platys.webui.url: http://dataplatform:3001
    ports:
      - 3001:3000
    environment:
      - SSHHOST=${DOCKER_HOST_IP:-localhost}
      - SSHPORT=22
      - SSHUSER=
      - SSHAUTH=password
      - PORT=3000
      - BASE=/
    volumes:
      - ./data-transfer:/data-transfer
    restart: unless-stopped
  #  ================================== markdown-viewer ========================================== #
  markdown-viewer:
    image: dannyben/madness:latest
    container_name: markdown-viewer
    hostname: markdown-viewer
    labels:
      com.platys.name: markdown-viewer
      com.platys.description: Platys Platform homepage viewer
      com.platys.webui.title: Markdown Viewer UI
      com.platys.webui.url: http://dataplatform:80
    ports:
      - 80:3000
    volumes:
      - ./artefacts:/docs
      - ./conf/markdown-viewer/markdown-madness.yml:/docs/.madness.yml
      - ./data-transfer:/data-transfer
    command: server
    restart: unless-stopped
    healthcheck:
      test: [CMD-SHELL, curl -f http://markdown-viewer:3000 || exit 1]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 1m
  markdown-renderer:
    image: trivadis/jinja2-renderer:0.8.1
    container_name: markdown-renderer
    hostname: markdown-renderer
    labels:
      com.platys.name: markdown-renderer
      com.platys.description: Platys Platform homepage rendering
    environment:
      USE_PUBLIC_IP: 'True'
      PUBLIC_IP: ${PUBLIC_IP:-127.0.0.1}
      DOCKER_HOST_IP: ${DOCKER_HOST_IP:-localhost}
      DATAPLATFORM_HOME: ${DATAPLATFORM_HOME}
      PLATYS_PLATFORM_NAME: nosql-platform-2
      PLATYS_PLATFORM_STACK: trivadis/platys-modern-data-platform
      PLATYS_PLATFORM_STACK_VERSION: develop
      PLATYS_COPY_COOKBOOK_DATA: 'True'
      PLATYS_DATACENTER:
      SERVICE_LIST_VERSION: 2
    volumes:
      - ./artefacts/templates:/templates
      - ./artefacts/templates:/scripts
      - .:/variables
      - ./artefacts:/output
      - ./data-transfer:/data-transfer
    init: true
volumes:
  data-transfer-vol:
    name: data_transfer_vol
